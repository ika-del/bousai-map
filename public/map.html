    }
    fcObj[l.id]=af.length;ldSet.delete(l.id);rS();uSt();uLg();
  }).catch(function(){erSet.add(l.id);ldSet.delete(l.id);rS();uSt()});
}

function rmL(l){if(!map)return;[l.id+"-ci",l.id+"-fl",l.id+"-ol",l.id+"-ln"].forEach(function(i){if(map.getLayer(i))map.removeLayer(i)});if(map.getSource(l.id+"-src"))map.removeSource(l.id+"-src");delete fcObj[l.id];uLg();uSt()}

function rS(){
  var c=document.getElementById("lList"),sv=(document.getElementById("sInput").value||"").toLowerCase(),h="";
  CS.forEach(function(cat){var cls=LS.filter(function(l){return l.c===cat.id}),flt=sv?cls.filter(function(l){return l.n.indexOf(sv)>=0||l.d.indexOf(sv)>=0}):cls;if(sv&&!flt.length)return;var isE=exCat.has(cat.id)||!!sv,ac=cls.filter(function(l){return stObj[l.id]}).length;

  h+='<div class="li'+(on?" a":"")+'" data-l="'+l.id+'"><div class="tg'+(on?" on":"")+'"></div><div class="cdt" style="background:'+l.fi+";border-color:"+l.co+'"></div><div class="lin"><div class="ln">'+l.ic+" "+l.n+'</div><div class="ld2">'+sub+"</div></div></div>"})});
  c.innerHTML=h;
  c.querySelectorAll(".ch").forEach(function(el){el.addEventListener("click",function(){var ct=el.dataset.c;if(exCat.has(ct))exCat.delete(ct);else exCat.add(ct);rS()})});
  c.querySelectorAll(".li").forEach(function(el){el.addEventListener("click",function(){var id=el.dataset.l,l=LS.find(function(x){return x.id===id});if(!l)return;stObj[id]=!stObj[id];if(stObj[id])loadL(l);else rmL(l);rS()})});
}
function uLg(){var a=LS.filter(function(l){return stObj[l.id]}),el=document.getElementById("leg");if(!a.length){el.style.display="none";return}el.style.display="block";var h='<h3>凡例</h3>';a.forEach(function(l){h+='<div class="lgi"><div class="lgs'+(l.g==="point"?" c":"")+'" style="background:'+l.fi+";border:2px solid "+l.co+'"></div><span>'+l.n+"</span></div>"});el.innerHTML=h}
function uSt(){var a=LS.filter(function(l){return stObj[l.id]}),ld=ldSet.size;document.getElementById("sDot").style.background=ld>0?"#F6AD55":"#48BB78";document.getElementById("sTxt").textContent=ld>0?ld+"レイヤー読込中...":a.length+"レイヤー表示中";if(map)document.getElementById("sZm").textContent="Z"+Math.floor(map.getZoom());var nz=a.some(function(l){return map&&map.getZoom()<l.mz-1}),zw=document.getElementById("zW");if(nz){zw.textContent="🔍 一部レイヤーはもう少しズームインすると表示されます";zw.style.display="block"}else zw.style.display="none"}

map=new maplibregl.Map({container:"map",style:{version:8,sources:{gsi:{type:"raster",tiles:["https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png"],tileSize:256,attribution:'<a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>'}},layers:[{id:"gsi",type:"raster",source:"gsi",minzoom:0,maxzoom:18}]},center:[139.7671,35.6812],zoom:13,maxZoom:18,minZoom:5});
map.addControl(new maplibregl.NavigationControl(),"top-right");
map.addControl(new maplibregl.GeolocateControl({positionOptions:{enableHighAccuracy:true},trackUserLocation:true}),"top-right");

map.on("load",function(){document.getElementById("splash").classList.add("h");setTimeout(function(){document.getElementById("splash").style.display="none"},600);loadAll();rS();uLg();uSt()});

document.getElementById("sTog").addEventListener("click",function(){sbOpen=!sbOpen;document.getElementById("sidebar").classList.toggle("collapsed",!sbOpen);document.getElementById("sTog").textContent=sbOpen?"◀":"▶";uOv();setTimeout(function(){if(map)map.resize()},350)});

(function(){var sb=document.getElementById("sidebar"),startX=0,startY=0,curX=0,dragging=false,sbW=300,edge=30;
